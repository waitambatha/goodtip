{% extends "base.html" %}
{% block container_class %}container-tiny{% endblock %}
{% block content %}
<div class="card" style="padding:32px;margin-top:64px">
  <h1 class="t-h1 mb-3">Reset password</h1>
  <p class="t-body text-secondary mb-6">Enter your email and we'll send you a link to set a new password.</p>
  <form method="post" class="stack gap-4">{% csrf_token %}
    {% for field in form %}
      <div>
        <label class="field-label">{{ field.label }}</label>
        {{ field }}
      </div>
    {% endfor %}
    <button class="btn-primary btn-block btn-lg">Send reset link</button>
  </form>
  <p class="t-small text-tertiary mt-6"><a href="{% url 'accounts:login' %}" class="link">← Back to log in</a></p>
</div>
{% endblock %}
