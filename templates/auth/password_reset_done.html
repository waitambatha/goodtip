{% extends "base.html" %}
{% block container_class %}container-tiny{% endblock %}
{% block content %}
<div class="card text-center" style="padding:48px;margin-top:64px">
  <span class="empty-icon"><i data-lucide="mail-check" class="icon-xl"></i></span>
  <h1 class="t-h1 mt-4 mb-3">Check your email</h1>
  <p class="t-body text-secondary mb-6">If an account exists for that email, a reset link has been sent.</p>
  <p class="t-small text-muted mb-6">(Dev mode: look at the Django runserver console for the message.)</p>
  <a href="{% url 'accounts:login' %}" class="btn-primary">Back to log in</a>
</div>
{% endblock %}
