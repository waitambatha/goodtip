{% if org %}
<div class="charity-strip">
  <div class="charity-strip-inner">
    <i data-lucide="heart" class="icon-sm" style="color:var(--accent)"></i>
    <span class="t-micro text-secondary"><span style="color:var(--accent)">RAISED FOR {{ org.charity_name|upper }}</span> · $0 / GOAL $1,200</span>
    <div class="charity-bar"><div class="charity-bar-fill" style="width:0%"></div></div>
    <span class="t-small text-tertiary hidden-mobile">{{ org.season }} · {{ org.sport_label }}</span>
  </div>
</div>
{% endif %}
