services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mbatha
      POSTGRES_PASSWORD: masterclass
      POSTGRES_DB: goodtip
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mbatha -d goodtip"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgres://mbatha:masterclass@db:5432/goodtip
      DEBUG: "False"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
